# android/gradle.properties  [shafeea_teach]
# ──────────────────────────────────────────────────────────────────────────────

# ── JVM memory for Gradle daemon ─────────────────────────────────────────────
# 4G is sufficient for Flutter+AGP builds on GitHub's 7GB runners.
# The previous 8G setting caused OOM on standard CI runners.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# ── AndroidX ─────────────────────────────────────────────────────────────────
android.useAndroidX=true

# ── Gradle performance ────────────────────────────────────────────────────────
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# ── R8 full mode ─────────────────────────────────────────────────────────────
# Enables more aggressive dead-code elimination via R8.
android.enableR8.fullMode=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
