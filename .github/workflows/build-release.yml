name: Build & Release – Teacher App

on:
  push:
    tags:
      - 'v*.*.*'        # triggers on: git tag v1.2.3+10  &&  git push --tags

permissions:
  contents: write      # required for gh release create and asset upload

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Build signed APK
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1️⃣  Checkout
      - uses: actions/checkout@v4

      # 2️⃣  Set up Java (required by Gradle / Android SDK)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣  Set up Flutter (pin to stable channel; matches sdk: ^3.11.4)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4️⃣  Extract version name and build number from the git tag
      #      Tag format: v1.2.3+45  →  name=1.2.3  code=45
      #      Tag format: v1.2.3     →  name=1.2.3  code=<run_number>
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ "$VERSION" == *"+"* ]]; then
            BUILD_NAME="${VERSION%%+*}"
            BUILD_NUMBER="${VERSION##*+}"
          else
            BUILD_NAME="$VERSION"
            BUILD_NUMBER="${{ github.run_number }}"
          fi

          echo "build_name=$BUILD_NAME"     >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                   >> "$GITHUB_OUTPUT"

      # 5️⃣  Decode the release keystore from the base64 secret
      - name: Decode keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo "$KEYSTORE_FILE" | base64 --decode > "$RUNNER_TEMP/release.jks"

      # 6️⃣  Install Flutter dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 7️⃣  Run code generation (injectable, flutter_gen, etc.)
      - name: Run build_runner
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          else
            echo "No build_runner dependency found, skipping."
          fi

      # 8️⃣  Build signed release APK
      - name: Build release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      # 9️⃣  Rename output for clarity
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/shafeea-teach-${{ steps.version.outputs.tag }}.apk

      # 🔟  Upload APK as workflow artifact (available for 7 days)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shafeea-teach-apk
          path: build/app/outputs/flutter-apk/shafeea-teach-${{ steps.version.outputs.tag }}.apk
          retention-days: 7

    outputs:
      build_name:   ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
      tag:          ${{ steps.version.outputs.tag }}

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Publish GitHub Release with the APK attached
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 1️⃣  Download the APK from the build job
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: shafeea-teach-apk
          path: dist/

      # 2️⃣  Create GitHub Release and attach APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "Teacher & Admin App ${{ needs.build.outputs.build_name }}"
          body: |
            ## تطبيق المعلم والإدارة – الإصدار ${{ needs.build.outputs.build_name }}

            ### التحميل
            انقر على الملف أدناه لتحميل التطبيق مباشرة على جهاز أندرويد.

            ### متطلبات التثبيت
            - أندرويد 7.0 (Nougat) أو أحدث
            - يجب تفعيل "مصادر غير معروفة" في إعدادات الأمان

            ---
            **Build:** `${{ needs.build.outputs.build_name }}+${{ needs.build.outputs.build_number }}`
          files: dist/shafeea-teach-${{ needs.build.outputs.tag }}.apk
          fail_on_unmatched_files: true
          make_latest: true
